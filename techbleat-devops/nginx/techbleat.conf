# -----------------------------------------------------------------------------
# Techbleat Superstore - Nginx Reverse Proxy Configuration
# Deploy to: /etc/nginx/conf.d/techbleat.conf
# -----------------------------------------------------------------------------
# Assignment: Key Config Concepts - upstream blocks, proxy_pass, X-Forwarded-* headers
# Routes:
#   /       -> Static frontend (/usr/share/nginx/html)
#   /api/*  -> FastAPI backend (localhost:8000)
# -----------------------------------------------------------------------------

upstream fastapi_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80 default_server;
    server_name _;

    # Static frontend - Assignment: /usr/share/nginx/html/
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # API reverse proxy - Assignment: /api/* -> FastAPI (localhost:8000)
    # NO trailing slash on proxy_pass (preserves /api/products)
    location /api/ {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
